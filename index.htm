<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>超毒舌 恋みくじ</title>

<style>

body{
background:#081a3a;
color:white;
text-align:center;
font-family:sans-serif;
padding-top:80px;
}

h1{
color:#6fa8ff;
}

select{
padding:10px;
font-size:16px;
border-radius:8px;
margin:20px;
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:12px;
cursor:pointer;
}

#paper{
margin-top:40px;
width:300px;
margin-left:auto;
margin-right:auto;
background:white;
color:black;
padding:20px;
border-radius:10px;
transform:scaleY(0);
transform-origin:top;
transition:0.6s;
}

.open{
transform:scaleY(1);
}

</style>
</head>

<body>

<h1>💙超毒舌 恋みくじ💙</h1>

<p>今の恋愛状況を選んでください</p>

<select id="loveType">
<option value="kata">片思い</option>
<option value="ryo">両想い</option>
<option value="lover">恋人</option>
</select>

<br>

<button onclick="draw()">恋みくじを引く</button>

<div id="paper"></div>

<audio id="paperSound" src="paper.mp3"></audio>
<audio id="bellSound" src="bell.mp3"></audio>

<script>

const kata = [
"大吉：その恋、かなり脈あり。でもあなたが鈍感すぎて気づいてない。",
"中吉：悪くない。でも待ってるだけじゃ恋は始まらない。",
"小吉：相手はあなたをいい人とは思ってる。でも恋とは別。",
"凶：今のままだと友達ゾーン固定です。動け。"
];

const ryo = [
"大吉：ほぼ理想の関係。でも油断すると普通に冷められる。",
"中吉：両想いだけど、あなたが少し重いと思われてる。",
"小吉：好き同士。でもお互い様子見しすぎ。",
"凶：その両想い、本当に同じ温度？"
];

const lover = [
"大吉：かなりいいカップル。たぶん周りに羨ましがられてる。",
"中吉：順調。でも慣れてきて雑になってない？",
"小吉：ちょっとマンネリ。たまには努力しよう。",
"凶：その恋、惰性で続いてない？"
];

function draw(){

document.getElementById("paper").classList.remove("open");

document.getElementById("paperSound").play();

let type = document.getElementById("loveType").value;

let result;

if(type=="kata"){
result = kata[Math.floor(Math.random()*kata.length)];
}

if(type=="ryo"){
result = ryo[Math.floor(Math.random()*ryo.length)];
}

if(type=="lover"){
result = lover[Math.floor(Math.random()*lover.length)];
}

setTimeout(function(){

document.getElementById("paper").innerText=result;
document.getElementById("paper").classList.add("open");
document.getElementById("bellSound").play();

},700);

}

</script>

</body>
</html>
