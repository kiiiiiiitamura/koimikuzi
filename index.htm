<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>超毒舌 恋みくじ</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:linear-gradient(180deg,#081a33,#1e40af);

margin:0;
}

h1{
margin-top:40px;
}

.box{
background:rgba(255,255,255,0.1);
width:430px;
margin:30px auto;

}

select{

margin:8px;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;

}

.card{
margin-top:20px;

background:white;

border-radius:12px;
}

.ema{
margin-top:20px;
background:white;
color:black;

}

.share{
display:inline-block;
margin-top:15px;
padding:10px 20px;
background:black;

text-decoration:none;
}

</style>

</head>

<body>

<h1>超毒舌 恋みくじ</h1>

<div class="box">

<p>性別</p>
<select id="sex">
<option>女性</option>
<option>男性</option>
<option>その他</option>
</select>

<p>性自認</p>
<select id="identity">
<option>女性</option>
<option>男性</option>
<option>ノンバイナリー</option>
<option>考え中</option>
</select>

<p>年齢層</p>
<select id="age">
<option>10代</option>
<option>20代</option>
<option>30代</option>
<option>40代以上</option>
</select>

<p>恋愛状況</p>
<select id="status">
<option>片思い</option>
<option>両思い</option>
<option>復縁したい</option>
<option>恋人なし</option>
</select>

<br>

<button onclick="draw()">おみくじを引く</button>

<div class="card">

<p id="message"></p>

<p id="rate"></p>

<p id="danger"></p>

<a id="share" class="share" target="_blank">Xでシェア</a>

</div>

<div class="ema">
<h3>絵馬（履歴）</h3>
<ul id="history"></ul>
</div>

</div>

<script>

const messages=[

"その恋、相手はまだ恋として認識してない。",
"脈ありだと思ってるの、もしかして自分だけ。",
"追いLINEは恋を終わらせる最短ルート。",
"理想が高すぎて現実が追いついてない。",
"その優しさ、都合よく使われるタイプ。",
"恋愛は想像より観察力。",
"その沈黙、ロマンじゃなくて様子見。",
"行動しない恋はただの妄想。",
"恋愛の主役は自分じゃなく相手の気持ち。",
"油断すると両思いでも普通に終わる。"

]

function draw(){

let msg = messages[Math.floor(Math.random()*messages.length)]

let rate = Math.floor(Math.random()*70)+10

let dangerLevel = Math.floor(Math.random()*5)+1

let stars=""

for(let i=0;i<dangerLevel;i++){
stars+="★"
}

document.getElementById("message").innerText=msg

document.getElementById("rate").innerText="恋愛成功率 "+rate+"%"

document.getElementById("danger").innerText="恋愛危険度 "+stars

let text = "今日の超毒舌恋みくじ：" + msg + " 恋愛成功率"+rate+"%"

let url = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text)

document.getElementById("share").href = url

let li=document.createElement("li")

li.innerText=msg

document.getElementById("history").appendChild(li)

}

</script>

</body>
</html>
