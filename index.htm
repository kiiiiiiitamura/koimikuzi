<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>超毒舌 恋みくじ</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:linear-gradient(180deg,#081a33,#1e40af);
color:white;
margin:0;
}

h1{
margin-top:40px;
}

.box{
background:rgba(255,255,255,0.1);
width:420px;
margin:30px auto;
padding:30px;
border-radius:15px;
backdrop-filter:blur(10px);
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#2563eb;
}

select{
padding:8px;
margin:10px;
}

.result{
margin-top:20px;
font-size:18px;
}

.ema{
margin-top:25px;
background:white;
color:black;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>超毒舌 恋みくじ</h1>

<div class="box">

<p>あなたについて</p>

<select id="gender">
<option value="female">女性</option>
<option value="male">男性</option>
<option value="none">好きな人なし</option>
</select>

<p>今の恋愛状況</p>

<select id="status">
<option value="kata">片思い</option>
<option value="ryo">両思い</option>
<option value="fukuen">復縁したい</option>
<option value="single">恋人なし</option>
</select>

<br>

<button onclick="draw()">おみくじを引く</button>

<div class="result" id="result"></div>

<div class="ema">

<h3>絵馬（履歴）</h3>
<ul id="history"></ul>

</div>

</div>

<script>

const messages=[

"その恋、相手はまだ恋と認識してない可能性高い。",
"理想高すぎ。現実の人間見よう。",
"そのLINE、たぶん友達扱い。",
"追いすぎ。少し引かれてる。",
"期待だけ膨らませて勝手に傷つくタイプ。",
"脈あると思ってるの自分だけかも。",
"恋愛より自己肯定感を育てた方がいい。",
"その恋、努力より思い込み。",
"焦りすぎ。恋はオーディションじゃない。",
"その優しさ、都合よく使われるタイプ。"

]

function draw(){

let msg=messages[Math.floor(Math.random()*messages.length)]

document.getElementById("result").innerText=msg

let li=document.createElement("li")
li.innerText=msg

document.getElementById("history").appendChild(li)

}

</script>

</body>
</html>
